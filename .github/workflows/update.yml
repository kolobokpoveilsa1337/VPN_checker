name: Update VPN configs

on:
  schedule:
    - cron: '0 6 * * *'   # каждый день в 6:00 UTC
  workflow_dispatch:      # позволяет запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run merge script (create all.txt)
      run: python merge.py

    - name: Split all.txt into 6 parts
      run: python split_configs.py

    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add all.txt part1.txt part2.txt part3.txt part4.txt part5.txt part6.txt
        git diff --staged --quiet || git commit -m "Автоматическое обновление и разделение конфигов"
        git push
