name: Update VPN configs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run merge script
      run: python merge.py

    - name: Split all.txt into 10 parts
      run: python split_configs.py

    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add all.txt split/
        git diff --staged --quiet || git commit -m "Автоматическое обновление и разделение конфигов"
        git pusht || git commit -m "Автоматическое обновление и разделение конфигов"
        git push
