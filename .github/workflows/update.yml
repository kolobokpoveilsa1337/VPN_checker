name: Update VPN configs

on:
  schedule:
    - cron: '0 6 * * *'   # каждый день в 6:00 UTC
  workflow_dispatch:      # позволяет запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Update urls.txt from category repository
      run: python add_category_urls.py

    - name: Run merge script (create all.txt)
      run: python merge.py

    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add urls.txt all.txt
        git diff --staged --quiet || git commit -m "Автоматическое обновление конфигов"
        git push
